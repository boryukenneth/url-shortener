spring.application.name=url-shortener

#jdbc tells spring where the database is running, username&pw
spring.datasource.url=jdbc:postgresql://localhost:5432/url_shortener_db
spring.datasource.username=postgres
spring.datasource.password=password
#automatically create/update tables, print sql to console, make sql readable
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true